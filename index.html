<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro OS9 Araucanía</title>
    
    <!-- Configuración para modo App (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Planilla OS9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e40af">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .form-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        select, input {
            font-size: 16px !important; /* Evita zoom automático en iPhone al enfocar */
        }
        .btn-animate:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] overflow-hidden border border-gray-100 form-card">
        <div class="bg-blue-800 p-8 text-white text-center">
            <h1 class="text-2xl font-bold tracking-tight uppercase">Planilla de Servicios</h1>
            <p class="text-blue-200 text-xs mt-1 font-medium tracking-widest">SECCIÓN OS9 ARAUCANÍA</p>
        </div>

        <form id="planillaForm" class="p-6 space-y-5">
            
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Sección</label>
                <input type="text" value="Sección OS9 Araucanía" readonly 
                       class="w-full p-4 bg-gray-50 rounded-2xl text-gray-500 font-semibold border-none cursor-not-allowed">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Jefe de Patrulla</label>
                <select name="jefe" id="selectJefe" required 
                        class="w-full p-4 rounded-2xl bg-gray-50 border-gray-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none appearance-none">
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Acompañantes</label>
                <div id="contenedorAcompanantes" class="space-y-3"></div>
                <button type="button" onclick="agregarAcompanante()" 
                        class="mt-3 text-blue-700 text-xs font-bold flex items-center hover:opacity-80 transition-opacity">
                    <span class="bg-blue-100 p-1.5 rounded-full mr-2">＋</span> AÑADIR ACOMPAÑANTE
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Fecha</label>
                    <input type="date" name="fecha" id="fechaActual" required 
                           class="w-full p-4 rounded-2xl bg-gray-50 border-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Libro (Guardia)</label>
                    <select name="libro" required class="w-full p-4 rounded-2xl bg-gray-50 border-gray-200 outline-none">
                        <option value="">...</option>
                        <option value="Primera guardia">1ra Guardia</option>
                        <option value="Segunda guardia">2da Guardia</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Folio</label>
                    <input type="number" name="folio" placeholder="000" 
                           class="w-full p-4 rounded-2xl bg-gray-50 border-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Línea</label>
                    <input type="number" name="linea" placeholder="000" 
                           class="w-full p-4 rounded-2xl bg-gray-50 border-gray-200 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1">Tipo de Servicio</label>
                <select name="servicio" id="tipoServicio" onchange="toggleOtro(this.value)" required 
                        class="w-full p-4 rounded-2xl bg-gray-50 border-gray-200 outline-none">
                    <option value="">Seleccione...</option>
                    <option value="Vigilancia">Vigilancia</option>
                    <option value="Búsqueda de información">Búsqueda de información</option>
                    <option value="Otro">Otro (Especificar)</option>
                </select>
            </div>

            <div id="campoOtro" class="hidden">
                <input type="text" name="servicio_otro" id="inputOtro" placeholder="¿Qué servicio realizó?" 
                       class="w-full p-4 rounded-2xl border-blue-200 bg-blue-50 text-blue-800 placeholder-blue-300 outline-none ring-2 ring-blue-100">
            </div>

            <button type="submit" id="btnEnviar" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-5 rounded-2xl shadow-lg transition-all btn-animate mt-6">
                REGISTRAR EN PLANILLA
            </button>
        </form>

        <div id="status" class="hidden p-5 text-center font-bold text-sm mx-6 mb-8 rounded-2xl"></div>
    </div>

    <script>
        const personal = [
            "TTE. CRL LEIVA CABRERA SEBASTIAN ANTONIO", "CAPITAN ALIAGA MONTOYA NICOLAS MARCELO",
            "CAPITAN ANGUITA VILLABLANCA EDUARDO ALEJANDRO", "TENIENTE MUÑOZ ESCOBAR MARTIN EDUARDO",
            "TENIENTE INOSTROZA VIDAL ESTEBAN ENRIQUE", "S.O.M. ANDRADES GALLEGOS ELVIS OMAR",
            "S.O.M LAGOS ACUÑA ALVARO ANTONIO", "S.O.M. MUÑOZ GATICA FRANCISCO LIBORIO",
            "S.O.M. ALARCON GODOY SERGIO ROLANDO", "S.O.M. MATUS MERINO CRISTIAN MARCELO",
            "SUBOFICIAL MAECHEL HECHENDORFER PATRICIO EDINSON", "SUBOFICIAL ALBORNOZ MENDOZA JESSICA MARIANE",
            "SUBOFICIAL RUIZ GONZALEZ PATRICIO ALEJANDRO", "SUBOFICIAL AEDO FRANCO MARCOS ANDRES",
            "SUBOFICIAL NORAMBUENA NORAMBUENA CAROLINA ANDREA", "SUBOFICIAL BARRIA MUÑOZ CRISTOBAL ANDRES",
            "SGTO.1RO. ORMAZABAL MARECHAL SOLANGE LIZBETH", "SGTO.1RO. ÑANCUCHEO HUERALAF JOSE IVAN",
            "SGTO. 1RO. OJEDA ALVAREZ CRISTIAN ALEXIS", "SGTO. 1RO. VENEGAS VENEGAS PABLO ANDRES",
            "SGTO. 1RO. CEA GALLEGAS ANDRES ALFREDO", "SGTO. 1RO. FLORES CONTRERAS ISMAEL EDUARDO",
            "SGTO. 2DO. YEFIH MARTINEZ MICHAEL ALEXANDER", "SGTO. 2DO. GARRIDO RETAMAL SEBASTIAN FREDY",
            "SGTO. 2DO. OCAMPO SAEZ SERGIO ENRIQUE", "SGTO. 2DO. MUÑOZ PALACIOS CRISTOBAL FELIPE",
            "SGTO. 2DO PONCE SALDAÑA JOVANNI IGNACIO", "SGTO. 2DO. ARIAS PINCHEIRA RENE MANUEL",
            "SGTO. 2DO. MARIFILO RAIN MARCELA ALEJANDRA", "CABO 1RO. MUÑOZ CONTRERAS CLAUDIO ENRIQUE",
            "CABO 1RO. TILLERIA MARTINEZ ITALO EDUARDO", "CABO 1RO. JARA SEGURA JUAN CARLOS",
            "CABO 1RO. NOVOA ZAMBRANO CARLOS GUSTAVO ANDRES", "CABO 1RO. RAVANALES QUIROZ DANTE FRANCO"
        ];

        function cargarSelect(el) {
            el.innerHTML = '<option value="">Seleccione...</option>';
            personal.forEach(n => { 
                const o = document.createElement('option'); 
                o.value = n; 
                o.textContent = n; 
                el.appendChild(o); 
            });
        }

        function agregarAcompanante() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center animate-in slide-in-from-left duration-300';
            const sel = document.createElement('select');
            sel.name = 'acompanantes[]';
            sel.className = 'flex-grow p-4 rounded-2xl bg-gray-50 border-gray-200 text-sm outline-none appearance-none';
            cargarSelect(sel);
            const btn = document.createElement('button');
            btn.type = 'button'; 
            btn.innerHTML = '✕';
            btn.className = 'w-12 h-12 flex items-center justify-center text-red-500 bg-red-50 rounded-2xl font-bold';
            btn.onclick = () => div.remove();
            div.append(sel, btn);
            document.getElementById('contenedorAcompanantes').appendChild(div);
        }

        function toggleOtro(v) {
            const c = document.getElementById('campoOtro');
            c.classList.toggle('hidden', v !== 'Otro');
            document.getElementById('inputOtro').required = (v === 'Otro');
        }

        window.onload = () => {
            document.getElementById('fechaActual').valueAsDate = new Date();
            cargarSelect(document.getElementById('selectJefe'));
            agregarAcompanante();
        };

        document.getElementById('planillaForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            const btn = document.getElementById('btnEnviar');
            
            // TU URL DE GOOGLE APPS SCRIPT YA INTEGRADA
            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbypV1Fl1OWa8ycCqLsi8beZqijDMXKEOdaCct_H9CdGYvah6levgEDlZPK-pfIUbl8/exec';

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            status.classList.remove('hidden');
            status.className = "p-5 text-center font-bold text-sm mx-6 mb-8 rounded-2xl bg-blue-50 text-blue-700 block animate-pulse";
            status.innerText = "Sincronizando con la nube...";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.acompanantes = formData.getAll('acompanantes[]');

            console.log('Datos a enviar:', data);

            try {
                await Promise.race([
                    fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'text/plain'
                        },
                        body: JSON.stringify(data)
                    }),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Tiempo de espera agotado')), 15000))
                ]);

                status.innerText = "¡REGISTRO EXITOSO!";
                status.className = "p-5 text-center font-bold text-sm mx-6 mb-8 rounded-2xl bg-green-50 text-green-700 block shadow-inner";
                
                setTimeout(() => {
                    status.classList.add('hidden');
                    e.target.reset();
                    document.getElementById('fechaActual').valueAsDate = new Date();
                    document.getElementById('contenedorAcompanantes').innerHTML = '';
                    agregarAcompanante();
                    btn.disabled = false;
                    btn.innerText = "REGISTRAR EN PLANILLA";
                }, 3500);

            } catch (err) {
                status.innerText = "ERROR AL ENVIAR. VERIFICA TU CONEXIÓN.";
                status.className = "p-5 text-center font-bold text-sm mx-6 mb-8 rounded-2xl bg-red-100 text-red-800 block";
                btn.disabled = false;
                btn.innerText = "REINTENTAR ENVÍO";
            }
        };
    </script>
</body>
</html>
