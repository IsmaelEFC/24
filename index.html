<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro OS9 Araucanía</title>
    
    <!-- Configuración para PWA -->
    <meta name="theme-color" content="#14532d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Manifiesto -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlJlZ2lzdHJvIE9TOSBBcmF1Y2Fuw61hIiwKICAic2hvcnRfbmFtZSI6ICJPUzkiLAogICJzdGFydF91cmwiOiAiaW5kZXguaHRtbCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI2YwZjRmMCIsCiAgInRoZW1lX2NvbG9yIjogIiMxNDUzMmQiLAogICJpY29ucyI6IFt7CiAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzEwMjIvMTAyMjIxMy5wbmciLAogICAgInNpemVzIjogIjUxMng1MTIiLAogICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogIH1dCn0=">

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f0; }
        .bg-institucional { background-color: #14532d; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-green-100">
        <div class="bg-institucional p-6 text-white text-center">
            <h1 class="text-xl font-bold tracking-tighter uppercase">Planilla de Servicios 24%</h1>
            <p class="text-green-200 text-[10px] font-semibold mt-1 tracking-widest uppercase">Sección OS9 Araucanía</p>
        </div>

        <form id="planillaForm" class="p-6 space-y-4">
            <!-- Los campos del formulario se mantienen iguales -->
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Unidad</label>
                <input type="text" value="Sección OS9 Araucanía" readonly class="w-full p-3 bg-gray-50 rounded-xl text-gray-500 font-medium border-none text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Jefe de Patrulla</label>
                <select name="jefe" id="selectJefe" required class="w-full p-3 rounded-xl bg-gray-50 border-gray-200 focus:ring-2 focus:ring-green-600 text-sm"></select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Acompañantes</label>
                <div id="contenedorAcompanantes" class="space-y-2"></div>
                <button type="button" onclick="agregarAcompanante()" class="mt-3 text-green-700 text-xs font-bold flex items-center hover:text-green-900">
                    <span class="bg-green-100 p-1 rounded-full mr-2">＋</span> AÑADIR PERSONAL
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Fecha</label>
                    <input type="date" name="fecha" id="fechaActual" required class="w-full p-3 rounded-xl bg-gray-50 border-gray-200 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">libro</label>
                    <input type="text" name="libro" placeholder="Ej: equipo 1" class="w-full p-3 rounded-xl bg-gray-50 border-gray-200 text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Folio</label>
                    <input type="number" name="folio" placeholder="Ej: 123" class="w-full p-3 rounded-xl bg-gray-50 border-gray-200 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Línea</label>
                    <input type="number" name="linea" placeholder="Ej: 123" class="w-full p-3 rounded-xl bg-gray-50 border-gray-200 text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Tipo de Servicio</label>
                <select name="servicio" id="tipoServicio" onchange="toggleOtro(this.value)" required class="w-full p-3 rounded-xl bg-gray-50 border-gray-200 text-sm">
                    <option value="">Seleccione tipo...</option>
                    <option value="Vigilancia">Vigilancia</option>
                    <option value="Búsqueda de información">Búsqueda de información</option>
                    <option value="Otro">Otro (Especificar)</option>
                </select>
            </div>

            <div id="campoOtro" class="hidden">
                <input type="text" name="servicio_otro" id="inputOtro" placeholder="Describa el servicio..." class="w-full p-3 rounded-xl border-green-200 bg-green-50 text-green-900 text-sm">
            </div>

            <button type="submit" id="btnEnviar" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all mt-4">
                REGISTRAR EN PLANILLA
            </button>
        </form>

        <div id="status" class="hidden p-4 text-center font-bold text-sm mx-6 mb-6 rounded-xl"></div>
    </div>

    <script>
        // Registro del Service Worker desde archivo externo
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrado'))
                    .catch(err => console.log('Fallo al registrar SW', err));
            });
        }

        // --- LÓGICA DE PERSONAL (La misma que ya funciona) ---
        const personal = [
            "TTE. CRL LEIVA CABRERA SEBASTIAN ANTONIO", "CAPITAN ALIAGA MONTOYA NICOLAS MARCELO",
            "CAPITAN ANGUITA VILLABLANCA EDUARDO ALEJANDRO", "TENIENTE MUÑOZ ESCOBAR MARTIN EDUARDO",
            "TENIENTE INOSTROZA VIDAL ESTEBAN ENRIQUE", "S.O.M. ANDRADES GALLEGOS ELVIS OMAR",
            "S.O.M LAGOS ACUÑA ALVARO ANTONIO", "S.O.M. MUÑOZ GATICA FRANCISCO LIBORIO",
            "S.O.M. ALARCON GODOY SERGIO ROLANDO", "S.O.M. MATUS MERINO CRISTIAN MARCELO",
            "SUBOFICIAL MAECHEL HECHENDORFER PATRICIO EDINSON", "SUBOFICIAL ALBORNOZ MENDOZA JESSICA MARIANE",
            "SUBOFICIAL RUIZ GONZALEZ PATRICIO ALEJANDRO", "SUBOFICIAL AEDO FRANCO MARCOS ANDRES",
            "SUBOFICIAL NORAMBUENA NORAMBUENA CAROLINA ANDREA", "SUBOFICIAL BARRIA MUÑOZ CRISTOBAL ANDRES",
            "SGTO.1RO. ORMAZABAL MARECHAL SOLANGE LIZBETH", "SGTO.1RO. ÑANCUCHEO HUERALAF JOSE IVAN",
            "SGTO. 1RO. OJEDA ALVAREZ CRISTIAN ALEXIS", "SGTO. 1RO. VENEGAS VENEGAS PABLO ANDRES",
            "SGTO. 1RO. CEA GALLEGAS ANDRES ALFREDO", "SGTO. 1RO. FLORES CONTRERAS ISMAEL EDUARDO",
            "SGTO. 2DO. YEFIH MARTINEZ MICHAEL ALEXANDER", "SGTO. 2DO. GARRIDO RETAMAL SEBASTIAN FREDY",
            "SGTO. 2DO. OCAMPO SAEZ SERGIO ENRIQUE", "SGTO. 2DO. MUÑOZ PALACIOS CRISTOBAL FELIPE",
            "SGTO. 2DO PONCE SALDAÑA JOVANNI IGNACIO", "SGTO. 2DO. ARIAS PINCHEIRA RENE MANUEL",
            "SGTO. 2DO. MARIFILO RAIN MARCELA ALEJANDRA", "CABO 1RO. MUÑOZ CONTRERAS CLAUDIO ENRIQUE",
            "CABO 1RO. TILLERIA MARTINEZ ITALO EDUARDO", "CABO 1RO. JARA SEGURA JUAN CARLOS",
            "CABO 1RO. NOVOA ZAMBRANO CARLOS GUSTAVO ANDRES", "CABO 1RO. RAVANALES QUIROZ DANTE FRANCO"
        ];

        function cargarSelect(el) {
            el.innerHTML = '<option value="">Seleccione funcionario...</option>';
            personal.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; el.appendChild(o); });
        }

        function agregarAcompanante() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center';
            const sel = document.createElement('select');
            sel.name = 'acompanantes[]';
            sel.className = 'flex-grow p-3 rounded-xl bg-gray-50 border-gray-200 text-sm';
            cargarSelect(sel);
            const btn = document.createElement('button');
            btn.type = 'button'; btn.innerHTML = '✕';
            btn.className = 'w-10 h-10 flex items-center justify-center text-red-500 bg-red-50 rounded-xl font-bold';
            btn.onclick = () => div.remove();
            div.append(sel, btn);
            document.getElementById('contenedorAcompanantes').appendChild(div);
        }

        function toggleOtro(v) {
            document.getElementById('campoOtro').classList.toggle('hidden', v !== 'Otro');
            document.getElementById('inputOtro').required = (v === 'Otro');
        }

        window.onload = () => {
            document.getElementById('fechaActual').valueAsDate = new Date();
            cargarSelect(document.getElementById('selectJefe'));
            agregarAcompanante();
        };

        document.getElementById('planillaForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            const btn = document.getElementById('btnEnviar');
            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx1ba-R65uGxVipc3mw5mmjNOMeDOiZD9kX3I5EK64AeKJ6ejXbaZYV3GT6eEochB6Z/exec';

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";
            status.className = "p-4 text-center font-bold text-sm mx-6 mb-6 rounded-xl bg-green-50 text-green-700 block";
            status.innerText = "Sincronizando...";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.acompanantes = formData.getAll('acompanantes[]');

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'text/plain'},
                    body: JSON.stringify(data)
                });

                status.innerText = "¡REGISTRO EXITOSO!";
                status.className = "p-4 text-center font-bold text-sm mx-6 mb-6 rounded-xl bg-green-600 text-white block";
                
                setTimeout(() => {
                    status.classList.add('hidden');
                    e.target.reset();
                    document.getElementById('fechaActual').valueAsDate = new Date();
                    document.getElementById('contenedorAcompanantes').innerHTML = '';
                    agregarAcompanante();
                    btn.disabled = false;
                    btn.innerText = "REGISTRAR EN PLANILLA";
                }, 3000);

            } catch (err) {
                status.innerText = "ERROR DE ENVÍO";
                status.className = "p-4 text-center font-bold text-sm mx-6 mb-6 rounded-xl bg-red-100 text-red-800 block";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
